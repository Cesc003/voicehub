<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0f0f0f;--surface:rgba(25,25,30,.78);--surface2:rgba(35,35,44,.86);--border:rgba(255,255,255,.1);
            --text:#e8e8e8;--muted:#888;--accent:#c084fc;--accent-dim:#9333ea;
            --glow:rgba(192,132,252,0.15);--danger:#ef4444;--success:#22c55e;
            --radius:16px;--radius-sm:12px;--shadow:0 10px 30px rgba(0,0,0,.25);--shadow-soft:0 6px 20px rgba(0,0,0,.2);
        }
        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
            background:radial-gradient(circle at 20% 0%, #1a1430 0%, #0e0e12 45%, #09090c 100%);
            color:var(--text);height:100vh;display:flex;overflow:hidden;line-height:1.5;
        }
        button, input, textarea, select{font:inherit}

        /* SIDEBAR */
        .sidebar{
            width:300px;background:rgba(18,18,24,.62);border-right:1px solid var(--border);
            display:flex;flex-direction:column;flex-shrink:0;backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);box-shadow:var(--shadow-soft);position:relative;z-index:15;
            transition:transform .35s ease;
        }
        .sidebar-header{padding:18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:-.015em}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 8px 20px rgba(147,51,234,.35)}
        .new-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;transition:transform .2s ease,background .2s ease,border-color .2s ease}
        .new-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.02)}



        .sidebar-list{flex:1;overflow-y:auto;padding:10px}
        .sidebar-item{padding:12px 13px;border-radius:12px;cursor:pointer;transition:transform .2s ease,background .2s ease,box-shadow .2s ease;border:1px solid transparent;margin-bottom:6px}
        .sidebar-item:hover{background:var(--surface2);transform:scale(1.015);box-shadow:var(--shadow-soft)}
        .sidebar-item.active{background:rgba(192,132,252,.12);border-color:rgba(192,132,252,.32)}
        .sidebar-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
        .sidebar-item-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
        .sidebar-item-tag{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--glow);color:var(--accent)}
        .sidebar-item-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
        .sidebar-item:hover .sidebar-item-actions{opacity:1}
        .sidebar-item-btn{width:24px;height:24px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .sidebar-item-btn:hover{background:var(--surface2);color:var(--text);transform:scale(1.05)}
        .sidebar-item-btn.del:hover{color:var(--danger)}

        .sidebar-search{padding:10px;border-bottom:1px solid var(--border)}
        .sidebar-search input{width:100%;min-height:44px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:11px;padding:10px 12px;color:var(--text);font-size:13px;transition:all .25s}
        .sidebar-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}

        .sidebar-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
        .sidebar-footer button{flex:1;min-height:42px;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
        .sidebar-footer button:hover{background:var(--surface2);color:var(--text);transform:scale(1.02)}

        /* MAIN AREA */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}

        /* Top bar */
        .topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(18,18,24,.62);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
        .topbar-left{display:flex;align-items:center;gap:12px}
        .mode-tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);padding:4px;border-radius:12px}
        .mode-tab{padding:9px 16px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .24s}
        .mode-tab.active{background:rgba(255,255,255,.06);color:var(--text);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
        .mode-tab:hover:not(.active){color:var(--text);transform:scale(1.02)}
        .topbar-right{display:flex;align-items:center;gap:10px}
        .status{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
        .status-dot{width:7px;height:7px;border-radius:50%}
        .status-dot.ready{background:var(--success)}
        .status-dot.loading{background:var(--accent);animation:pulse 1s infinite}
        .status-dot.playing{background:var(--success);animation:pulse 1s infinite}
        .status-dot.error{background:var(--danger)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .gear-btn,.menu-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .gear-btn:hover,.menu-btn:hover{background:var(--surface2);color:var(--text);transform:scale(1.02)}
        .menu-btn{display:none}

        /* Content panels */
        .content{flex:1;display:flex;flex-direction:column;padding:22px 24px;overflow-y:auto;gap:18px;animation:tab-fade .3s ease}
        .content.hidden{display:none}
        @keyframes tab-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* Reader */
        .text-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;color:var(--text);font-size:15px;line-height:1.75;resize:none;min-height:180px;transition:all .25s;box-shadow:var(--shadow-soft)}
        .text-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow),var(--shadow-soft)}
        .text-input::placeholder{color:var(--muted)}
        .text-meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}

        /* Player */
        .player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow-soft)}
        .progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;cursor:pointer}
        .progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear}
        .player-row{display:flex;align-items:center;justify-content:space-between}
        .player-left{display:flex;align-items:center;gap:10px}
        .play-btn{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,#d8b4fe,var(--accent-dim));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 10px 20px rgba(147,51,234,.32);transition:all .24s}
        .play-btn:hover{transform:scale(1.05);filter:brightness(1.03)}
        .play-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .stop-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
        .stop-btn:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
        .time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
        .player-right{display:flex;align-items:center;gap:14px}
        .speed-btns{display:flex;gap:2px;background:rgba(0,0,0,.28);padding:4px;border-radius:10px}
        .speed-btn{min-height:34px;padding:3px 9px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:700;border-radius:7px;transition:all .2s}
        .speed-btn.active{background:var(--accent);color:#fff}
        .speed-btn:hover:not(.active){color:var(--text);transform:scale(1.02)}
        .voice-select{min-height:40px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:10px;padding:7px 10px;color:var(--text);font-size:12px;cursor:pointer;max-width:170px;transition:all .2s}
        .voice-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}

        /* Dictation */
        .dict-center{display:flex;flex-direction:column;align-items:center;padding:30px;gap:16px}
        .mic-btn{width:84px;height:84px;border-radius:50%;border:1px solid var(--border);background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:32px;transition:all .3s;position:relative;box-shadow:var(--shadow-soft)}
        .mic-btn::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid transparent;opacity:0;transform:scale(.85)}
        .mic-btn.rec{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.08);color:var(--danger)}
        .mic-btn.rec::before{border-color:rgba(239,68,68,.42);animation:mic-ring 1.6s ease-out infinite;opacity:1}
        @keyframes mic-ring{0%{transform:scale(.82);opacity:.8}100%{transform:scale(1.22);opacity:0}}
        .mic-label{font-size:13px;color:var(--muted)}
        .dict-output{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;min-height:120px;font-size:15px;line-height:1.7;white-space:pre-wrap;flex:1;box-shadow:var(--shadow-soft)}
        .dict-actions{display:flex;gap:6px;flex-wrap:wrap}
        .btn{min-height:44px;padding:8px 14px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:5px}
        .btn:hover{background:var(--surface2);border-color:var(--accent);transform:scale(1.02)}
        .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .btn.primary:hover{background:var(--accent-dim)}

        /* Empty */
        .empty{text-align:center;padding:50px 20px;color:var(--muted)}
        .empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}

        /* Modal */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
        .modal-bg.vis{display:flex}
        .modal{background:rgba(17,17,24,.9);border:1px solid var(--border);border-radius:16px;padding:22px;width:90%;max-width:440px;backdrop-filter:blur(12px)}
        .modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
        .field{margin-bottom:14px}
        .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
        .field input,.field select{width:100%;min-height:44px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;transition:all .24s}
        .field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
        .modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

        /* Toast */
        .toast{position:fixed;bottom:20px;right:20px;background:rgba(18,18,24,.94);border:1px solid var(--border);border-radius:12px;padding:12px 18px 16px;font-size:13px;z-index:200;opacity:0;transform:translateX(22px);transition:all .35s;pointer-events:none;overflow:hidden;box-shadow:var(--shadow)}
        .toast::after{content:'';position:absolute;left:0;bottom:0;height:3px;width:100%;background:linear-gradient(90deg,var(--accent),#e9d5ff);transform-origin:left;transform:scaleX(0)}
        .toast.vis{opacity:1;transform:translateX(0)}
        .toast.vis::after{animation:toast-progress 3s linear forwards}
        @keyframes toast-progress{from{transform:scaleX(1)}to{transform:scaleX(0)}}

        .spinner{width:16px;height:16px;border:2px solid transparent;border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .sidebar-overlay{display:none}

        @media (max-width: 767px){
            body{overflow:auto}
            .menu-btn{display:flex}
            .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);width:min(82vw,320px)}
            .sidebar.open{transform:translateX(0)}
            .sidebar-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:12}
            .sidebar-overlay.vis{opacity:1;pointer-events:auto}
            .topbar{padding:12px 14px}
            .topbar-right .status{display:none}
            .content{padding:14px}
            .player-row{flex-direction:column;align-items:stretch;gap:12px}
            .player-left,.player-right{justify-content:space-between}
            .player-right{flex-wrap:wrap}
            .voice-select{max-width:none;flex:1}
            .dict-actions .btn{flex:1;justify-content:center}
            .toast{left:14px;right:14px;bottom:14px}
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo"><div class="logo-icon">&#x1F3A7;</div>VoiceHub</div>
        <button class="new-btn" onclick="newSession()">+ Nuevo</button>
    </div>
    <div class="sidebar-search">
        <input type="text" id="sidebarSearch" placeholder="Buscar..." oninput="renderSidebar()">
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
        <button onclick="exportNotes()">&#x1F4E5; Exportar</button>
        <button onclick="toggleSettings()">&#x2699; Config</button>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="reader" onclick="setMode('reader',this)">&#x1F4D6; Lector</button>
                <button class="mode-tab" data-mode="dictation" onclick="setMode('dictation',this)">&#x1F3A4; Dictado</button>
                <button class="mode-tab" data-mode="notes" onclick="setMode('notes',this)">&#x270F; Notas</button>
            </div>
        </div>
        <div class="topbar-right">
            <div class="status"><span class="status-dot ready" id="sDot"></span><span id="sTxt">Listo</span></div>
            <button class="gear-btn" onclick="toggleSettings()">&#x2699;</button>
        </div>
    </div>

    <!-- READER -->
    <div class="content" id="mode-reader">
        <textarea class="text-input" id="textInput" placeholder="Pega aqui el texto que quieres escuchar...

Ctrl+Enter = Play/Pausa | Escape = Stop"></textarea>
        <div class="text-meta">
            <button class="btn" onclick="saveCurrentText()">&#x1F4BE; Guardar</button>
            <span><span id="charCount">0</span> caracteres</span>
        </div>
        <div class="player">
            <div class="progress-bar" id="pBar" onclick="seekAudio(event)">
                <div class="progress-fill" id="pFill"></div>
            </div>
            <div class="player-row">
                <div class="player-left">
                    <button class="play-btn" id="playBtn" onclick="togglePlay()">&#x25B6;</button>
                    <button class="stop-btn" onclick="stopAudio()">&#x25A0;</button>
                    <span class="time" id="timeDisp">0:00 / 0:00</span>
                </div>
                <div class="player-right">
                    <div class="speed-btns">
                        <button class="speed-btn" data-speed="0.75">0.75</button>
                        <button class="speed-btn active" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="1.25">1.25</button>
                        <button class="speed-btn" data-speed="1.5">1.5</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                    </div>
                    <select class="voice-select" id="voiceSelect" onchange="onVoiceChange()">
                        <option value="pFZP5JQG7iQjIQuC4Bku">Lily - Calida</option>
                        <option value="onwK4e9ZLuTAKqWW03F9">Daniel - Profundo</option>
                        <option value="EXAVITQu4vr4xnSDxMaL">Sarah - Clara</option>
                        <option value="IKne3meq5aSn9XLyUdCD">Charlie - Casual</option>
                        <option value="JBFqnCBsd6RMkjVDRZzb">George - Britanico</option>
                        <option value="TX3LPaxmHKxFdv7VOQHJ">Liam - Potente</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- DICTATION -->
    <div class="content hidden" id="mode-dictation">
        <div class="dict-center">
            <button class="mic-btn" id="micBtn" onclick="toggleRec()">&#x1F3A4;</button>
            <span class="mic-label" id="micLabel">Pulsa para dictar</span>
        </div>
        <div class="dict-output" id="dictOut">Las transcripciones apareceran aqui...</div>
        <div class="dict-actions">
            <button class="btn" onclick="copyDict()">&#x1F4CB; Copiar</button>
            <button class="btn primary" onclick="saveDict()">&#x1F4BE; Guardar nota</button>
            <button class="btn" onclick="dictToReader()">&#x1F50A; Enviar al Lector</button>
            <button class="btn" onclick="clearDict()">&#x1F5D1; Limpiar</button>
        </div>
    </div>

    <!-- NOTES (write manually) -->
    <div class="content hidden" id="mode-notes">
        <textarea class="text-input" id="noteInput" placeholder="Escribe tu nota aqui..." style="flex:1"></textarea>
        <div class="dict-actions" style="margin-top:12px">
            <button class="btn primary" onclick="saveManualNote()">&#x1F4BE; Guardar nota</button>
            <button class="btn" onclick="noteToReader()">&#x1F50A; Enviar al Lector</button>
            <button class="btn" onclick="document.getElementById('noteInput').value=''">&#x1F5D1; Limpiar</button>
        </div>
    </div>
</div>

<!-- SETTINGS -->
<div class="modal-bg" id="settingsModal">
    <div class="modal">
        <h2>&#x2699; Configuracion</h2>
        <div class="field">
            <label>API Key de ElevenLabs</label>
            <input type="password" id="apiKeyIn" placeholder="sk_...">
        </div>
        <div class="field">
            <label>Modelo TTS</label>
            <select id="modelIn">
                <option value="eleven_multilingual_v2">Multilingual v2 (recomendado)</option>
                <option value="eleven_turbo_v2_5">Turbo v2.5 (rapido)</option>
                <option value="eleven_turbo_v2">Turbo v2</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn" onclick="toggleSettings()">Cancelar</button>
            <button class="btn primary" onclick="saveSettings()">Guardar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const S = {
    apiKey: localStorage.getItem('vh_key') || '',
    model: localStorage.getItem('vh_model') || 'eleven_multilingual_v2',
    speed: 1,
    playing: false,
    recording: false,
    audio: null,
    audioTextHash: null, // track what text was converted
    notes: JSON.parse(localStorage.getItem('vh_notes') || '[]'),
    dictText: '',
    sidebarFilter: 'all',
    activeNoteId: null
};

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('apiKeyIn').value = S.apiKey;
    document.getElementById('modelIn').value = S.model;
    renderSidebar();
    if (!S.apiKey) { toggleSettings(); toast('Configura tu API Key para empezar'); }
});

// ===== MODE SWITCH =====
function setMode(mode, btn) {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
    document.getElementById('mode-' + mode).classList.remove('hidden');
    if (window.innerWidth < 768) toggleSidebar(false);
}

function toggleSidebar(force) {
    const sb = document.querySelector('.sidebar');
    const ov = document.getElementById('sidebarOverlay');
    const open = typeof force === 'boolean' ? force : !sb.classList.contains('open');
    sb.classList.toggle('open', open);
    ov.classList.toggle('vis', open);
}

// ===== SIDEBAR =====
function renderSidebar() {
    const list = document.getElementById('sidebarList');
    const q = (document.getElementById('sidebarSearch')?.value || '').toLowerCase();
    let notes = S.notes.filter(n => {
        if (q && !n.content.toLowerCase().includes(q) && !(n.title || '').toLowerCase().includes(q)) return false;
        return true;
    });

    if (notes.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F4DD;</div><p>' +
            (q ? 'Sin resultados' : 'Sin notas todavia') + '</p></div>';
        return;
    }

    const icons = { dictado: '&#x1F3A4;', nota: '&#x270F;', lector: '&#x1F4D6;' };
    list.innerHTML = notes.map(n => {
        const d = new Date(n.date);
        const ds = d.toLocaleDateString('es-ES', {day:'numeric',month:'short'}) + ' ' +
                   d.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
        const title = n.title || n.content.substring(0, 50).replace(/\n/g, ' ');
        const active = n.id === S.activeNoteId ? ' active' : '';
        const icon = icons[n.source] || '&#x1F4D6;';
        return '<div class="sidebar-item' + active + '" onclick="loadNote(' + n.id + ')">' +
            '<div class="sidebar-item-title">' + icon + ' ' + esc(title) + '</div>' +
            '<div class="sidebar-item-meta">' +
                '<span>' + ds + '</span>' +
                '<span class="sidebar-item-actions">' +
                    '<button class="sidebar-item-btn del" onclick="event.stopPropagation();delNote(' + n.id + ')" title="Eliminar">&#x2715;</button>' +
                '</span>' +
            '</div></div>';
    }).join('');
}

function loadNote(id) {
    const n = S.notes.find(x => x.id === id);
    if (!n) return;
    S.activeNoteId = id;
    document.getElementById('textInput').value = n.content;
    document.getElementById('charCount').textContent = n.content.length.toLocaleString();
    // Switch to reader
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-mode="reader"]').classList.add('active');
    document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
    document.getElementById('mode-reader').classList.remove('hidden');
    if (window.innerWidth < 768) toggleSidebar(false);
    // Reset audio since text changed
    invalidateAudio();
    renderSidebar();
}

function newSession() {
    S.activeNoteId = null;
    document.getElementById('textInput').value = '';
    document.getElementById('charCount').textContent = '0';
    invalidateAudio();
    renderSidebar();
}

function delNote(id) {
    S.notes = S.notes.filter(n => n.id !== id);
    persistNotes();
    if (S.activeNoteId === id) S.activeNoteId = null;
    renderSidebar();
    toast('Nota eliminada');
}

function addNote(content, source) {
    const title = content.substring(0, 60).replace(/\n/g, ' ').trim();
    const note = { id: Date.now(), title: title, content: content.trim(), date: new Date().toISOString(), source: source };
    S.notes.unshift(note);
    persistNotes();
    S.activeNoteId = note.id;
    renderSidebar();
    toast('Nota guardada');
    return note;
}

function persistNotes() {
    localStorage.setItem('vh_notes', JSON.stringify(S.notes));
}

function saveCurrentText() {
    const t = document.getElementById('textInput').value.trim();
    if (!t) { toast('No hay texto'); return; }
    // Update if active note exists
    if (S.activeNoteId) {
        const n = S.notes.find(x => x.id === S.activeNoteId);
        if (n) {
            n.content = t;
            n.title = t.substring(0, 60).replace(/\n/g, ' ').trim();
            n.date = new Date().toISOString();
            persistNotes();
            renderSidebar();
            toast('Nota actualizada');
            return;
        }
    }
    addNote(t, 'lector');
}

function exportNotes() {
    const text = S.notes.map(n => {
        const d = new Date(n.date).toLocaleString('es-ES');
        return '--- ' + d + ' [' + n.source + '] ---\n' + n.content;
    }).join('\n\n');
    const blob = new Blob([text], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'voicehub_notas_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    toast('Notas exportadas');
}

// ===== TEXT INPUT =====
document.getElementById('textInput').addEventListener('input', e => {
    document.getElementById('charCount').textContent = e.target.value.length.toLocaleString();
    invalidateAudio();
});

function invalidateAudio() {
    if (S.audio) { S.audio.pause(); URL.revokeObjectURL(S.audio.src); S.audio = null; }
    S.playing = false;
    S.audioTextHash = null;
    updatePlayBtn();
    document.getElementById('pFill').style.width = '0%';
    document.getElementById('timeDisp').textContent = '0:00 / 0:00';
}

// ===== TTS =====
async function togglePlay() {
    if (S.playing) {
        if (S.audio) { S.audio.pause(); S.playing = false; updatePlayBtn(); setStatus('ready','Pausado'); }
        return;
    }

    const text = document.getElementById('textInput').value.trim();
    if (!text) { toast('Pega texto primero'); return; }
    if (!S.apiKey) { toggleSettings(); return; }

    // Resume paused
    if (S.audio && S.audio.paused && S.audioTextHash === hashStr(text)) {
        S.audio.play(); S.playing = true; updatePlayBtn(); setStatus('playing','Reproduciendo');
        return;
    }

    // New generation
    setStatus('loading', 'Generando audio...');
    const pb = document.getElementById('playBtn');
    pb.innerHTML = '<div class="spinner"></div>'; pb.disabled = true;

    try {
        const vid = document.getElementById('voiceSelect').value;
        const r = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + vid, {
            method: 'POST',
            headers: { 'xi-api-key': S.apiKey, 'Content-Type': 'application/json', 'Accept': 'audio/mpeg' },
            body: JSON.stringify({ text: text, model_id: S.model, voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.3 } })
        });
        if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail?.message || 'Error ' + r.status); }

        const blob = await r.blob();
        if (S.audio) { S.audio.pause(); URL.revokeObjectURL(S.audio.src); }

        S.audio = new Audio(URL.createObjectURL(blob));
        S.audio.playbackRate = S.speed;
        S.audioTextHash = hashStr(text);

        S.audio.addEventListener('timeupdate', () => {
            const p = (S.audio.currentTime / S.audio.duration) * 100;
            document.getElementById('pFill').style.width = p + '%';
            const c = fmt(S.audio.currentTime), t = fmt(S.audio.duration || 0);
            document.getElementById('timeDisp').textContent = c + ' / ' + t;
        });
        S.audio.addEventListener('ended', () => { S.playing = false; updatePlayBtn(); setStatus('ready','Listo'); });

        await S.audio.play();
        S.playing = true;
        setStatus('playing', 'Reproduciendo');
    } catch (err) {
        toast('Error: ' + err.message);
        setStatus('error', 'Error');
    }
    pb.disabled = false; updatePlayBtn();
}

function stopAudio() {
    if (S.audio) { S.audio.pause(); S.audio.currentTime = 0; }
    S.playing = false; updatePlayBtn();
    document.getElementById('pFill').style.width = '0%';
    setStatus('ready', 'Listo');
}

function onVoiceChange() {
    // Invalidate audio so next play uses new voice
    invalidateAudio();
    toast('Voz cambiada - pulsa Play para escuchar');
}

function updatePlayBtn() {
    document.getElementById('playBtn').innerHTML = S.playing ? '&#x23F8;' : '&#x25B6;';
}

function seekAudio(e) {
    if (!S.audio || !S.audio.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    S.audio.currentTime = ((e.clientX - r.left) / r.width) * S.audio.duration;
}

function fmt(s) { return isNaN(s) ? '0:00' : Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
function hashStr(s) { let h = 0; for(let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h; }

// ===== SPEED =====
document.querySelectorAll('.speed-btn').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('.speed-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        S.speed = parseFloat(b.dataset.speed);
        if (S.audio) S.audio.playbackRate = S.speed;
    });
});

// ===== DICTATION (ElevenLabs STT - works in all browsers) =====
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let recTimer = null;
let recSeconds = 0;

function toggleRec() {
    if (S.recording) stopRec(); else startRec();
}

async function startRec() {
    if (!S.apiKey) { toggleSettings(); toast('Configura tu API Key'); return; }

    try {
        // Get mic permission (reuse stream if already granted)
        if (!micStream || micStream.getTracks().some(t => t.readyState === 'ended')) {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }

        audioChunks = [];
        mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
            // Transcribe with ElevenLabs
            if (audioChunks.length === 0) return;
            document.getElementById('micLabel').textContent = 'Transcribiendo...';
            setStatus('loading', 'Transcribiendo...');

            try {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('file', audioBlob, 'recording.webm');
                formData.append('model_id', 'scribe_v1');
                formData.append('language_code', 'spa');

                const resp = await fetch('https://api.elevenlabs.io/v1/speech-to-text', {
                    method: 'POST',
                    headers: { 'xi-api-key': S.apiKey },
                    body: formData
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail?.message || 'Error ' + resp.status);
                }

                const result = await resp.json();
                const transcript = result.text || '';

                if (transcript) {
                    S.dictText += (S.dictText ? ' ' : '') + transcript;
                    document.getElementById('dictOut').textContent = S.dictText;
                    toast('Transcripcion completada');
                } else {
                    toast('No se detecto voz');
                }
            } catch (err) {
                console.error('STT error:', err);
                toast('Error al transcribir: ' + err.message);
            }

            setStatus('ready', 'Listo');
            document.getElementById('micLabel').textContent = 'Pulsa para dictar';
        };

        mediaRecorder.start(1000); // collect data every second
        S.recording = true;
        recSeconds = 0;
        document.getElementById('micBtn').classList.add('rec');
        updateRecTimer();
        recTimer = setInterval(updateRecTimer, 1000);

    } catch(err) {
        toast('No se pudo acceder al micro: ' + err.message);
    }
}

function stopRec() {
    S.recording = false;
    if (recTimer) { clearInterval(recTimer); recTimer = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
    document.getElementById('micBtn').classList.remove('rec');
}

function updateRecTimer() {
    recSeconds++;
    const m = Math.floor(recSeconds / 60);
    const s = recSeconds % 60;
    document.getElementById('micLabel').textContent =
        'Grabando ' + m + ':' + String(s).padStart(2, '0') + ' \u2014 pulsa para parar y transcribir';
}

function copyDict() {
    navigator.clipboard.writeText(S.dictText || '');
    toast('Copiado');
}

function saveDict() {
    if (!S.dictText.trim()) { toast('No hay texto para guardar'); return; }
    addNote(S.dictText.trim(), 'dictado');
}

function dictToReader() {
    if (!S.dictText.trim()) { toast('No hay texto'); return; }
    document.getElementById('textInput').value = S.dictText;
    document.getElementById('charCount').textContent = S.dictText.length.toLocaleString();
    setMode('reader', document.querySelector('[data-mode="reader"]'));
    invalidateAudio();
    toast('Texto enviado al lector');
}

function clearDict() {
    S.dictText = '';
    document.getElementById('dictOut').textContent = 'Las transcripciones apareceran aqui...';
}

// ===== MANUAL NOTES =====
function saveManualNote() {
    const t = document.getElementById('noteInput').value.trim();
    if (!t) { toast('Escribe algo primero'); return; }
    addNote(t, 'nota');
    document.getElementById('noteInput').value = '';
}

function noteToReader() {
    const t = document.getElementById('noteInput').value.trim();
    if (!t) { toast('No hay texto'); return; }
    document.getElementById('textInput').value = t;
    document.getElementById('charCount').textContent = t.length.toLocaleString();
    setMode('reader', document.querySelector('[data-mode="reader"]'));
    invalidateAudio();
    toast('Texto enviado al lector');
}

// ===== SETTINGS =====
function toggleSettings() { document.getElementById('settingsModal').classList.toggle('vis'); }
function saveSettings() {
    S.apiKey = document.getElementById('apiKeyIn').value.trim();
    S.model = document.getElementById('modelIn').value;
    localStorage.setItem('vh_key', S.apiKey);
    localStorage.setItem('vh_model', S.model);
    toggleSettings();
    toast('Configuracion guardada');
    setStatus('ready', 'Listo');
}

// ===== UTILS =====
function setStatus(t, txt) {
    document.getElementById('sDot').className = 'status-dot ' + t;
    document.getElementById('sTxt').textContent = txt;
}
function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('vis');
    setTimeout(() => t.classList.remove('vis'), 3000);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== KEYS =====
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); togglePlay(); }
    if (e.key === 'Escape') {
        if (document.getElementById('settingsModal').classList.contains('vis')) toggleSettings();
        else stopAudio();
    }
});
</script>
